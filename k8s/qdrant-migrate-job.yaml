apiVersion: batch/v1
kind: Job
metadata:
  name: qdrant-migrate
  namespace: ttrpg
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "pf2e-mcp"
        vault.hashicorp.com/agent-inject-secret-qdrant: "secret/data/qdrant"
        vault.hashicorp.com/agent-inject-template-qdrant: |
          {{- with secret "secret/data/qdrant" -}}
          {{ index .Data.data "cloud-api-key" }}
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: pf2e-mcp
      containers:
        - name: migrate
          image: 192.168.1.10:30002/library/pf2e-mcp:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              export CLOUD_API_KEY=$(cat /vault/secrets/qdrant)
              python - <<EOF
              import os, sys, tempfile, requests

              LOCAL      = "http://qdrant.infra.svc.cluster.local:6333"
              CLOUD      = "https://d4e3a099-2b51-4f69-9c13-b1e2260ac493.us-east-2-0.aws.cloud.qdrant.io"
              CLOUD_KEY  = os.environ["CLOUD_API_KEY"]
              COLLECTION = "pf2e"
              HEADERS    = {"api-key": CLOUD_KEY}

              print("==> Creating snapshot on local Qdrant...")
              r = requests.post(f"{LOCAL}/collections/{COLLECTION}/snapshots")
              r.raise_for_status()
              snap_name = r.json()["result"]["name"]
              print(f"    Snapshot: {snap_name}")

              print("==> Downloading snapshot...")
              dl = requests.get(f"{LOCAL}/collections/{COLLECTION}/snapshots/{snap_name}", stream=True)
              dl.raise_for_status()
              with tempfile.NamedTemporaryFile(suffix=".snapshot", delete=False) as f:
                  for chunk in dl.iter_content(chunk_size=8 * 1024 * 1024):
                      f.write(chunk)
                  snap_path = f.name
              size_mb = os.path.getsize(snap_path) / 1024 / 1024
              print(f"    Downloaded {size_mb:.1f} MB to {snap_path}")

              print("==> Uploading to Qdrant Cloud...")
              with open(snap_path, "rb") as f:
                  up = requests.post(
                      f"{CLOUD}/collections/{COLLECTION}/snapshots/upload?priority=snapshot",
                      headers=HEADERS,
                      files={"snapshot": (snap_name, f, "application/octet-stream")},
                      timeout=600,
                  )
              up.raise_for_status()
              print(f"    Response: {up.json()}")
              print("==> Migration complete.")
              EOF
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      imagePullSecrets:
        - name: harbor-creds
