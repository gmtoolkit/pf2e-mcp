app = "ttrpg-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT              = "8080"
  QDRANT_URL        = "https://d4e3a099-2b51-4f69-9c13-b1e2260ac493.us-east-2-0.aws.cloud.qdrant.io"
  QDRANT_COLLECTION = "pf2e"
  SF2E_COLLECTION   = "sf2e"
  DS_COLLECTION     = "draw-steel"
  VOYAGE_MODEL      = "voyage-3"


[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines   = false
  auto_start_machines  = false
  min_machines_running = 1
  max_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
